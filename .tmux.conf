##### Core /////////////////////////////////////////////////////////////////////
set -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Tc,xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB,ghostty:RGB'
set -sg escape-time 10

# Rendering & history
set -g history-limit 100000
set -g aggressive-resize on
set -g focus-events on
set -g bell-action none
set -g visual-activity on

# Status
set -g status-position top
set -g status-interval 5
set -g display-time 2000

# Indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Mouse + vi
set -g mouse on
setw -g mode-keys vi

# Clipboard (OSC52 + platform tools)
set -g set-clipboard on
set -g @copy_to_clipboard 'if command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -in -selection clipboard; elif command -v pbcopy >/dev/null 2>&1; then pbcopy; else cat >/dev/null; fi'

##### Prefix & Keys ////////////////////////////////////////////////////////////
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload
unbind r
bind r source-file ~/.tmux.conf \; display-message "✔ tmux.conf reloaded"

# Navigate panes (vim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split in current dir
unbind %
bind | split-window -h -c '#{pane_current_path}'
unbind '"'
bind - split-window -v -c '#{pane_current_path}'

# Resize (Shift + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Toggle zoom / sync
bind m resize-pane -Z
bind C-y set -w synchronize-panes \; display-message "sync-panes: #{?pane_synchronized,on,off}"

# New window uses current dir
bind c new-window -c '#{pane_current_path}'

# Swap
bind '{' swap-pane -U
bind '}' swap-pane -D

##### Copy-mode (vi) + system clipboard ///////////////////////////////////////
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# Yank to system clipboard
bind -T copy-mode-vi Y send -X copy-pipe-and-cancel "#{@copy_to_clipboard}"
unbind Y
bind Y run "tmux save-buffer - | sh -c '#{@copy_to_clipboard}'" \; display-message '📋 copied'

##### Catppuccin Theme /////////////////////////////////////////////////////////
set -g @catppuccin_flavor "macchiato"

# Windows
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator ""
set -g @catppuccin_window_middle_separator "█"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

# Status
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_modules_right "directory session time"
set -g @catppuccin_directory_text "#{pane_current_path}"
set -g @catppuccin_time_text "%H:%M"
set -g @catppuccin_time_icon "󰥔"

##### Plugins (TPM) ////////////////////////////////////////////////////////////
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Auto-install TPM if missing
if-shell '[ ! -d ~/.config/tmux/plugins/tpm ]' \
  'run-shell "git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm"'

run-shell '~/.config/tmux/plugins/tpm/tpm'
